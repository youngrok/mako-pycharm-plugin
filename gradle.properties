# Plugin coordinates
pluginGroup = com.github.youngrok.mako
pluginName = Mako Template Support
pluginVersion = 0.3.0

# Supported PyCharm build range.
# 251 = 2025.1.x. Open-ended so it keeps loading on future builds.
pluginSinceBuild = 243
pluginUntilBuild =

# Target platform: PyCharm Professional 2025.1
platformType = PY
platformVersion = 2025.1

# Bundled plugins/modules we depend on.
# PythonCore = the Python language plugin (bundled in PyCharm).
# Pythonid bundles PythonTemplateLanguage and its content modules (Pro). It
# supersedes PythonCore (which it depends on) for our needs.
platformBundledPlugins = Pythonid
# Internal Python module that provides PythonTemplateLanguage (the base class for
# entries in the "Python Template Languages" dropdown: Django/Jinja2/Chameleon).
platformBundledModules = intellij.template.lang.core

# Gradle
org.gradle.configuration-cache = true
org.gradle.caching = true
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC

kotlin.stdlib.default.dependency = false

# Build with JDK 21 (required by the IntelliJ Platform 2025.1 target).
# Gradle auto-detects installed JDKs; ensure a JDK 21 is available on your machine.
